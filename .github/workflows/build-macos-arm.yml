name: Build macOS ARM

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write   # needed to create/update releases

jobs:
  build-macos-arm:
    name: macOS ARM (Apple Silicon)
    runs-on: macos-14   # native M1/M2 runner

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable + aarch64 target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache Cargo registry & build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Tauri CLI v2
        run: cargo install tauri-cli --version "^2" --locked

      - name: Build
        env:
          APPLE_SIGNING_IDENTITY: "-"   # ad-hoc signing; replace with cert for distribution
        run: cargo tauri build --target aarch64-apple-darwin

      - name: Publish to GitHub Releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DMG=$(ls src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg)
          VERSION=$(grep '^version' src-tauri/Cargo.toml | head -1 | cut -d'"' -f2)
          TAG="v${VERSION}"
          # Replace any existing release for this version so re-runs don't fail
          gh release delete "$TAG" --yes 2>/dev/null || true
          gh release create "$TAG" \
            --title "v${VERSION} — macOS ARM (Apple Silicon)" \
            --notes "**Download:** \`$(basename "$DMG")\`
          Built from commit ${{ github.sha }} on \`macos-14\` (aarch64).
          Ad-hoc signed — on first launch right-click → Open to bypass Gatekeeper." \
            "$DMG"
